<style>
:root{--bg:#f4f6f8;--surface:#fff;--surface2:#f0f2f5;--border:#e0e4ea;--prologis:#004D41;--feature:#7dd3c8;--bugfix:#fdba74;--free:#1a8f50;--warn:#b45309;--over:#b91c1c;--text:#111827;--muted:#6b7280;--potential:#c4b5fd;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;}
header{background:#1e3a6e;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
.hl h1{font-size:20px;font-weight:800;color:#fff;}
.hl p{font-size:11px;color:rgba(255,255,255,0.55);font-family:'JetBrains Mono',monospace;margin-top:3px;}
.legend{display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
.li{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,0.8);font-family:'JetBrains Mono',monospace;}
.ld{width:10px;height:10px;border-radius:2px;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px 32px;border-bottom:1px solid var(--border);background:var(--surface);}
.sc{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.sl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:.5px;}
.sv{font-size:20px;font-weight:800;margin-top:2px;font-family:'JetBrains Mono',monospace;}
.toolbar{padding:10px 32px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:600;transition:opacity .15s;}
.btn-green{background:var(--prologis);color:#fff;}
.btn-ghost{background:var(--surface2);color:var(--muted);border:1px solid var(--border);}
.btn:hover{opacity:.85;}
.fb{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .15s;}
.fb.active,.fb:hover{background:var(--surface);color:var(--text);border-color:var(--muted);}
.fb[data-q="Q1"].active{border-color:#7c3aed;color:#7c3aed;background:#f5f3ff;}
.fb[data-q="Q2"].active{border-color:#1a6fb5;color:#1a6fb5;background:#eff6ff;}
.fb[data-q="Q3"].active{border-color:#1a8f50;color:#1a8f50;background:#f0fdf4;}
.fb[data-q="Q4"].active{border-color:#b45309;color:#b45309;background:#fffbeb;}
.fb[data-q="Q1_27"].active{border-color:#7c3aed;color:#7c3aed;background:#f5f3ff;}
.gantt-wrap{padding:16px 32px;overflow-x:auto;}
.gantt{min-width:1600px;position:relative;}
.months{display:flex;margin-left:120px;margin-bottom:6px;}
.ml{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--muted);text-align:center;border-left:1px dashed var(--border);padding:2px 4px;white-space:nowrap;overflow:hidden;}
.gr{display:flex;align-items:center;margin-bottom:5px;}
.gl{width:120px;flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding-right:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px;}
.gt{flex:1;height:26px;position:relative;cursor:default;}
.gtrack{position:absolute;top:0;height:100%;border-radius:4px;overflow:hidden;cursor:pointer;transition:filter .15s;min-width:4px;border:1.5px solid rgba(0,0,0,0.18);}
.gtrack:hover{filter:brightness(.88);}
.gbg{position:absolute;top:0;left:0;right:0;height:100%;background:var(--surface2);border:1px solid var(--border);border-radius:4px;pointer-events:none;}
.gbar{position:absolute;top:0;left:0;height:100%;width:100%;display:flex;}
.bp{background:var(--prologis);}.bf{background:var(--feature);}.bb{background:var(--bugfix);}.bpo{background:var(--potential);}
.gfl{font-size:10px;font-family:'JetBrains Mono',monospace;font-weight:700;white-space:nowrap;margin-left:6px;flex-shrink:0;}
.ok{color:var(--free);}.wa{color:var(--warn);}.ov{color:var(--over);}
.now{display:none;}
.now-lbl{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-family:'JetBrains Mono',monospace;color:#ef4444;white-space:nowrap;font-weight:700;}
.qdot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}
.q1d{background:#7c3aed;}.q2d{background:#1a6fb5;}.q3d{background:#1a8f50;}.q4d{background:#b45309;}
.dim{opacity:.4;}
.today-line{position:absolute;top:0;bottom:0;width:2px;background:#ef4444;z-index:20;pointer-events:none;}
.today-label{position:absolute;top:0;left:3px;font-size:9px;font-family:'JetBrains Mono',monospace;color:#ef4444;font-weight:700;white-space:nowrap;}
.cur-row .gt{box-shadow:0 0 0 2px #f0c040;}
.panel{display:none;margin:8px 32px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.panel.open{display:block;}
.ph{background:#1e3a6e;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;}
.ph h3{font-size:14px;font-weight:700;color:#fff;font-family:'JetBrains Mono',monospace;}
.pm{font-size:11px;color:rgba(255,255,255,.6);font-family:'JetBrains Mono',monospace;}
.pc{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:18px;line-height:1;padding:0;}
.pc:hover{color:#fff;}
.pst{display:flex;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.psc{flex:1;min-width:80px;padding:10px 14px;border-right:1px solid var(--border);}
.psc:last-child{border-right:none;}
.psl{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;text-transform:uppercase;}
.psv{font-size:18px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-top:2px;}
.ptasks{padding:12px 18px;display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;}
.pt{display:grid;grid-template-columns:10px 1fr 110px 90px 60px;gap:8px;align-items:center;padding:7px 10px;background:var(--surface2);border-radius:6px;font-size:12px;}
.ptd{width:8px;height:8px;border-radius:2px;}
.ptn{font-family:'Syne',sans-serif;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ptc{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ptj{font-family:'JetBrains Mono',monospace;font-size:11px;}
.ptj a{color:#1a6fb5;text-decoration:none;}
.ptj a:hover{text-decoration:underline;}
.pth{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;text-align:right;}
.pe{font-size:12px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:8px 0;}
.upd{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;padding:8px 32px 16px;}
.empty-msg{text-align:center;padding:48px 32px;color:var(--muted);}
.empty-msg h2{font-size:18px;font-weight:700;margin-bottom:8px;}
.empty-msg p{font-size:13px;font-family:'JetBrains Mono',monospace;}
</style>
</head>

    '<div class="sc"><div class="sl">Current sprint free</div><div class="sv" style="color:'+(cf>=20?'var(--free)':cf>=0?'var(--warn)':'var(--over)')+'">'+cf+'h</div></div>'+
    '<div class="sc"><div class="sl">Future free</div><div class="sv" style="color:var(--free)">'+freeH+'h</div></div>'+
    '<div class="sc"><div class="sl">Features logged</div><div class="sv" style="color:var(--feature)">'+featH+'h</div></div>'+
    '<div class="sc"><div class="sl">Bugfixes logged</div><div class="sv" style="color:var(--bugfix)">'+bugH+'h</div></div>'+
    '<div class="sc"><div class="sl">Overloaded</div><div class="sv" style="color:'+(over>0?'var(--over)':'var(--free)')+'">'+over+'</div></div>';
}
function renderGantt(){
  var el=document.getElementById('gantt');
  if(!loaded){
    el.innerHTML='<div class="empty-msg"><h2>No data loaded</h2><p>Click "Import JSON" to load data exported from the Editor.</p></div>';
    return;
  }
  var hasVis=Object.keys(vis).some(function(k){return vis[k];});
  var filtered=SP.filter(function(s){
    if(hasVis&&!vis[s.id])return false;
    return filt==='ALL'||s.q===filt;
  });
  if(!filtered.length){el.innerHTML='<div style="padding:32px;text-align:center;color:var(--muted);font-family:JetBrains Mono,monospace">No sprints.</div>';return;}
  var minD=new Date(filtered[0].s),maxD=new Date(filtered[filtered.length-1].e);
  var totalMs=maxD-minD;
  var months=[],d=new Date(minD.getFullYear(),minD.getMonth(),1);
  while(d<=maxD){months.push(new Date(d));d=new Date(d.getFullYear(),d.getMonth()+1,1);}
  var mHtml=months.map(function(m){
    var mp=Math.max(0,(m-minD)/totalMs*100);
    var me=new Date(m.getFullYear(),m.getMonth()+1,1);
    var mw=Math.min(100,(me-minD)/totalMs*100)-mp;
    return '<div class="ml" style="width:'+mw.toFixed(2)+'%">'+m.toLocaleDateString('en-GB',{month:'short',year:'2-digit'})+'</div>';
  }).join('');
  var today=new Date();
  var rows=filtered.map(function(s){
    var st=stats(s.id),past=isPast(s),cur=isCur(s);
    var c=st.cap,sS=new Date(s.s),sE=new Date(s.e);
    var cp=Math.min(100,st.cH/c*100),fp=Math.min(100-cp,st.fH/c*100),bp=Math.min(100-cp-fp,st.bH/c*100),pop=Math.min(100-cp-fp-bp,(st.poH||0)/c*100);
    var fc=st.free<0?'ov':st.free<20?'wa':'ok';
    var ft=st.free<0?(Math.abs(st.free)+'h!'):(st.free+'h');
    var qdMap={'Q1':'q1d','Q2':'q2d','Q3':'q3d','Q4':'q4d','Q1_27':'q1d'};
    var qdc=qdMap[s.q]||'q1d';
    var label=s.id.replace('2026_','').replace('2027_','');
    var nowH='';
    var leftPct=((sS-minD)/totalMs*100).toFixed(2);
    var widPct=((sE-sS)/totalMs*100).toFixed(2);
    if(cur&&today>=sS&&today<=sE){
      var np=((today-sS)/(sE-sS)*100).toFixed(1);
      nowH='<div class="now" style="left:'+np+'%"><div class="now-lbl">TODAY</div></div>';
    }
    return '<div class="gr'+(past?' dim':'')+(cur?' cur-row':'')+'">'+
      '<div class="gl"><div class="qdot '+qdc+'"></div>'+label+'</div>'+
      '<div class="gt">'+
        '<div class="gbg"></div>'+
        '<div class="gtrack" style="left:'+leftPct+'%;width:'+widPct+'%" onclick="openPanel(\''+s.id+'\')" title="'+fd(s.s)+' - '+fd(s.e)+'">'+
          '<div class="gbar">'+
            '<div class="bp" style="width:'+cp.toFixed(1)+'%"></div>'+
            '<div class="bf" style="width:'+fp.toFixed(1)+'%"></div>'+
            '<div class="bb" style="width:'+bp.toFixed(1)+'%"></div>'+
          '<div class="bpo" style="width:'+pop.toFixed(1)+'%"></div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<span class="gfl '+fc+'">'+ft+'</span>'+
    '</div>';
  }).join('');
  var todayPct=((today-minD)/totalMs*100);
  var todayLine='';
  if(todayPct>=0&&todayPct<=100){
    // Render today as a special overlay row: label col (120px) + track col with line at todayPct%
    todayLine='<div class="gr" style="position:absolute;top:0;bottom:0;left:0;right:0;pointer-events:none;margin:0;">'+
      '<div style="width:120px;flex-shrink:0"></div>'+
      '<div style="flex:1;position:relative;height:100%">'+
        '<div style="position:absolute;top:-8px;bottom:0;left:'+todayPct.toFixed(2)+'%;width:2px;background:#ef4444;z-index:30;">'+
          '<div style="position:absolute;top:0;left:3px;font-size:9px;font-family:JetBrains Mono,monospace;color:#ef4444;font-weight:700;white-space:nowrap">TODAY</div>'+
        '</div>'+
      '</div>'+
    '</div>';
  }
  var visBanner=hasVis?'<div style="padding:6px 0 10px;font-size:11px;color:var(--prologis);font-family:JetBrains Mono,monospace;">&#128065; Showing '+filtered.length+' selected sprint'+(filtered.length!==1?'s':'')+' (Viewer scope)</div>':'';
  el.innerHTML=visBanner+'<div class="months">'+mHtml+'</div>'+
    '<div style="position:relative">'+todayLine+rows+'</div>';
}
function openPanel(sid){
  var s=SP.find(function(x){return x.id===sid;}),st=stats(sid),ts=tasks[sid]||[];
  document.getElementById('ptitle').textContent=sid.replace('2026_','').replace('2027_','');
  document.getElementById('pmeta').textContent=fd(s.s)+' - '+fd(s.e);
  document.getElementById('pstats').innerHTML=
    '<div class="psc"><div class="psl">Prologis</div><div class="psv" style="color:var(--prologis)">'+st.cH+'h</div></div>'+
    '<div class="psc"><div class="psl">Features</div><div class="psv" style="color:var(--feature)">'+st.fH+'h</div></div>'+
    '<div class="psc"><div class="psl">Bugfixes</div><div class="psv" style="color:var(--bugfix)">'+st.bH+'h</div></div>'+
    '<div class="psc"><div class="psl">Potential</div><div class="psv" style="color:var(--potential)">'+(st.poH||0)+'h</div></div>'+
    '<div class="psc"><div class="psl">Free</div><div class="psv" style="color:'+(st.free<0?'var(--over)':st.free<20?'var(--warn)':'var(--free)')+'">'+st.free+'h</div></div>'+
    '<div class="psc"><div class="psl">Capacity</div><div class="psv">'+st.cap+'h</div></div>';
  var th=ts.length?ts.map(function(t){
    var jd=t.url?('<a href="'+t.url+'" target="_blank">'+(t.jira||'link')+'</a>'):(t.jira||'&mdash;');
    return '<div class="pt">'+
      '<div class="ptd" style="background:'+tc(t.type)+'"></div>'+
      '<div class="ptn" title="'+t.name+'">'+t.name+'</div>'+
      '<div class="ptc">'+(t.client||'&mdash;')+'</div>'+
      '<div class="ptj">'+jd+'</div>'+
      '<div class="pth">'+t.h+'h</div>'+
    '</div>';
  }).join(''):'<div class="pe">No tasks logged for this sprint.</div>';
  document.getElementById('ptasks').innerHTML=th;
  document.getElementById('panel').classList.add('open');
  document.getElementById('panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}
function closePanel(){document.getElementById('panel').classList.remove('open');}
function impTrig(){document.getElementById('impFile').click();}
function loadData(d){
  tasks=d.tasks||{};ov=d.ov||{};cap=d.cap||160;prol=d.prol||50;vis=d.vis||{};
  rawData=d;loaded=true;
  document.getElementById('hsub').textContent='Default: '+cap+'h/sprint - Prologis reserved: '+prol+'h';
  document.getElementById('expBtn').style.display='';
  document.getElementById('expHtmlBtn').style.display='';
  if(d.exportedAt)document.getElementById('upd').textContent='Last updated: '+new Date(d.exportedAt).toLocaleString('en-GB');
  renderStats();renderGantt();
}
function impJson(e){
  var f=e.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{loadData(JSON.parse(ev.target.result));}catch(er){alert('Invalid JSON.');}
  };
  r.readAsText(f);
}
function expJson(){
  if(!rawData)return;
  var b=new Blob([JSON.stringify(rawData,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tam_data.json';a.click();
}
function expHtml(){
  if(!rawData)return;
  // Inject current data into a copy of this page's HTML
  var src=document.documentElement.outerHTML;
  // Replace the impJson call result by pre-loading data on init
  var dataScript='<script>window._PRELOAD='+JSON.stringify(rawData)+';<\/script>';
  // Insert preload script right before closing head
  var injected=src.replace('</head>',dataScript+'</head>');
  // Add auto-load call after renderGantt();
  injected=injected.replace('renderStats();renderGantt();','renderStats();renderGantt();if(window._PRELOAD){loadData(window._PRELOAD);}');
  var b=new Blob([injected],{type:'text/html'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='tam_planner_confluence.html';a.click();
}
renderStats();renderGantt();
</script>
</body>
</html>
